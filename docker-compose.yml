version: '3.8'

services:
  tanuki-serving:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tanuki-serving
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./knowledge.db:/app/knowledge.db
      - ./output_knowledge:/app/output_knowledge
      - ./documents:/app/documents
    environment:
      - TANUKI_API_BASE=http://localhost:3001
      - TANUKI_MODEL=qwen2.5-coder:1.5b
      - TANUKI_TARGET_DIRS=./documents
    depends_on:
      - ollama
    networks:
      - tanuki-network

  tanuki-ui:
    image: nginx:alpine
    container_name: tanuki-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./tanuki-ui:/usr/share/nginx/html:ro
    networks:
      - tanuki-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # 🐾 GPUを使用する場合は、以下のブロックのコメントアウトを解除してください
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - tanuki-network

  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama-puller
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      echo 'Waiting for Ollama to start...' &&
      until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 1; done &&
      echo 'Ollama started. Pulling model qwen2.5-coder:1.5b (blocking)...' &&
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5-coder:1.5b\", \"stream\": false}' &&
      echo 'Model qwen2.5-coder:1.5b pulled successfully!'
      "
    networks:
      - tanuki-network

networks:
  tanuki-network:
    driver: bridge

volumes:
  ollama_data:
